<body>

    <label for="nome">Nome:</label>

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telfone" placeholder="(99) 99999-9999">
    <label for="linkdin">Linkedin:</label>
    <input type="linkedin" id="linkedin" name="email" required>
    <label for="endereço">Endereço:</label>
    <input type="endereço" id="endereço" name="endereço" required>
